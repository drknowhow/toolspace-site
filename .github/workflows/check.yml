name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  byte-identity:
    name: schema + examples match install-manifest-spec
    runs-on: ubuntu-latest
    steps:
      - name: Checkout toolspace-site
        uses: actions/checkout@v4
        with:
          path: toolspace-site

      - name: Checkout install-manifest-spec
        uses: actions/checkout@v4
        with:
          repository: drknowhow/install-manifest-spec
          path: install-manifest-spec

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify byte-identity
        working-directory: toolspace-site
        run: python scripts/sync_from_spec.py --check --spec-path ../install-manifest-spec

  validate-manifests-json:
    name: manifests.json structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate manifests.json
        run: python scripts/validate_manifests_index.py

  registry-pages-fresh:
    name: registry pages match a fresh build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify registry/ matches a fresh build
        run: python scripts/build_registry_pages.py --check

  changelog-page-fresh:
    name: changelog page matches a fresh build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify changelog/ matches a fresh build
        run: python scripts/build_changelog_page.py --check

  federation-pipeline-tests:
    name: federation pipeline unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest + federation deps
        run: |
          python -m pip install --upgrade pip pytest
          pip install -r requirements-federation.txt

      - name: Run federation pipeline tests
        run: python -m pytest tests/test_federation_pipeline.py -v

  homepage-version-guard:
    name: homepage advertises spec's current version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout toolspace-site
        uses: actions/checkout@v4
        with:
          path: toolspace-site

      - name: Checkout install-manifest-spec
        uses: actions/checkout@v4
        with:
          repository: drknowhow/install-manifest-spec
          path: install-manifest-spec

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Run homepage version-drift tests
        working-directory: toolspace-site
        run: python -m pytest tests/test_homepage_version_guard.py -v

  manifest-lint:
    name: install-manifest lint (advisory)
    runs-on: ubuntu-latest
    # Advisory only — emits style/best-practice findings beyond schema validity.
    # Does NOT use --strict; existing examples carry known findings (missing
    # verify blocks, secret env hardening, action docs.goal) that are out of
    # scope for this gate. Flip to --strict once examples are cleaned up in
    # a dedicated PR.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install install-manifest CLI (>=0.5.0)
        run: python -m pip install --upgrade pip "install-manifest>=0.5.0"

      - name: Lint example manifests
        run: |
          for manifest in examples/*.json; do
            echo "::group::lint $manifest"
            python -m install_manifest lint "$manifest" || true
            echo "::endgroup::"
          done

